<!DOCTYPE html>
<html>
<head>
    <title>Gestion Dépenses</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Gestion de dépenses</h1>
</header>

<div class="dashboard">
    <div class="card">
        <h3>Total</h3>
        <p id="total">0 FCFA</p>
    </div>

    <div class="card">
        <h3>Nombre</h3>
        <p id="count">0</p>
    </div>
</div>

<form id="formDepense">
    <input id="categorie" placeholder="Catégorie" required>
    <input id="montant" type="number" placeholder="Montant" required>
    <input id="date" type="date" required>
    <input id="description" placeholder="Description">
    <button type="submit">Ajouter</button>
</form>

<div id="liste"></div>

<script src="script.js"></script>
</body>
</html>
